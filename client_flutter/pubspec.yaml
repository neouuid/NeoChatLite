name: neochat
description: NeoChat - A modern cross-platform chat application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^13.0.0

  # HTTP & API
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # WebSocket
  web_socket_channel: ^2.4.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # JSON
  json_annotation: ^4.8.1

  # UI Components
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  file_picker: ^6.1.1
  image_picker: ^1.0.7
  photo_view: ^0.14.0
  wechat_assets_picker: ^9.0.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.2
  permission_handler: ^11.2.0
  device_info_plus: ^9.1.2
  package_info_plus: 9.0.1
  url_launcher: ^6.2.3
  share_plus: ^7.2.1
  http: ^1.2.0
  image_gallery_saver: ^2.0.3

  # WebRTC (for calls)
  flutter_webrtc: ^0.10.6

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
